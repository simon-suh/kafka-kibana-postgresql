# docker-compose.yml
# Defines all the services (containers) that make up Project 2A.
# Docker Compose reads this file and spins up each service as a container.

version: '3.8'  # The version of Docker Compose syntax being used

services:  # Everything under here is a service (container) that Docker will run

  # ─── ZOOKEEPER ───────────────────────────────────────────
  # Zookeeper is a coordinator that Kafka requires to manage its brokers and topics.
  # Kafka cannot run without Zookeeper (in this classic setup).
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0  # The Docker image to pull. confluentinc is the company behind Kafka. 7.5.0 is the version.
    container_name: zookeeper                # Names the running container "zookeeper" so it's easy to identify
    environment:                             # Environment variables passed into the container (like settings/config)
      ZOOKEEPER_CLIENT_PORT: 2181            # The port Zookeeper listens on for incoming connections from Kafka
      ZOOKEEPER_TICK_TIME: 2000              # Heartbeat interval in milliseconds — how often Zookeeper checks if things are alive
    ports:
      - "2181:2181"                          # Maps port 2181 on your Windows machine to port 2181 inside the container
                                             # Format is "HOST:CONTAINER" — left side is your machine, right side is inside Docker

  # ─── KAFKA ───────────────────────────────────────────────
  # Kafka is the message broker. It receives messages (logs/events) from your app
  # and holds them in topics until a consumer (like Elasticsearch) reads them.
  kafka:
    image: confluentinc/cp-kafka:7.5.0      # Confluent's Kafka image, same version family as Zookeeper
    container_name: kafka                    # Names the running container "kafka"
    depends_on:
      - zookeeper                            # Tells Docker Compose to start Zookeeper before Kafka, since Kafka needs it
    ports:
      - "9092:9092"                          # Kafka's default port — your app will send messages to localhost:9092
    environment:
      KAFKA_BROKER_ID: 1                     # Unique ID for this Kafka broker. Since we only have one broker, it's 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181          # Tells Kafka where to find Zookeeper. Uses the container name "zookeeper" as the hostname
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092  # The address Kafka tells clients to connect to
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1        # How many copies of offset data to keep. Set to 1 because we only have 1 broker

  # ─── SCHEMA REGISTRY ─────────────────────────────────────
  # Schema Registry stores and manages the structure (schema) of your Kafka messages.
  # It ensures messages follow a defined format (using Avro schemas) so consumers
  # know exactly what fields to expect in each log/event.
  schema-registry:
    image: confluentinc/cp-schema-registry:7.5.0  # Confluent's Schema Registry image
    container_name: schema-registry                # Names the running container "schema-registry"
    depends_on:
      - kafka                                      # Schema Registry needs Kafka running first
    ports:
      - "8081:8081"                                # Port to access the Schema Registry API
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry              # The hostname this service identifies itself as
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:9092  # Tells Schema Registry which Kafka broker to connect to

  # ─── ELASTICSEARCH ───────────────────────────────────────
  # Elasticsearch receives log/event data from Kafka and indexes it,
  # making it searchable. Kibana then reads from Elasticsearch to display the data.
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0  # Official Elasticsearch image from Elastic
    container_name: elasticsearch                                  # Names the running container "elasticsearch"
    environment:
      - discovery.type=single-node      # Runs as a single node (no cluster). Fine for local development
      - xpack.security.enabled=false    # Disables authentication/security. Easier for local dev, never do this in production
      - ES_JAVA_OPTS=-Xms512m -Xmx512m # Sets minimum and maximum Java heap memory to 512MB to prevent it using too much RAM
    ports:
      - "9200:9200"                     # Elasticsearch's default HTTP port — used to query data and check health
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data  # Persists indexed data to a named volume so it survives container restarts

  # ─── KIBANA ──────────────────────────────────────────────
  # Kibana is the UI for Elasticsearch. It lets you search, filter,
  # and visualise the log/event data that Elasticsearch has indexed.
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0  # Official Kibana image — must match Elasticsearch version
    container_name: kibana                          # Names the running container "kibana"
    depends_on:
      - elasticsearch                               # Kibana needs Elasticsearch running first
    ports:
      - "5601:5601"                                 # Kibana's default port — open localhost:5601 in your browser to access the UI
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200  # Tells Kibana where to find Elasticsearch. Uses container name as hostname

  # ─── POSTGRESQL ──────────────────────────────────────────
  # PostgreSQL is a relational database. Your app stores structured
  # data here (e.g. user records, transactions) separate from the log stream.
  postgresql:
    image: postgres:16                  # Official PostgreSQL image, version 16
    container_name: postgresql          # Names the running container "postgresql"
    ports:
      - "5432:5432"                     # PostgreSQL's default port
    environment:
      POSTGRES_USER: admin              # Username for the database
      POSTGRES_PASSWORD: admin123       # Password for the database (fine for local dev)
      POSTGRES_DB: appdb                # Name of the default database that gets created on startup
    volumes:
      - postgresql-data:/var/lib/postgresql/data  # Persists database data so it survives container restarts

  # ─── GRAFANA ─────────────────────────────────────────────
  # Grafana is a monitoring dashboard tool. It connects to Elasticsearch
  # and PostgreSQL as data sources and lets you build visual dashboards
  # to monitor your stack's health and activity.
  grafana:
    image: grafana/grafana:10.2.0       # Official Grafana image, version 10.2.0
    container_name: grafana             # Names the running container "grafana"
    depends_on:
      - elasticsearch                   # Waits for Elasticsearch to start first
      - postgresql                      # Waits for PostgreSQL to start first
    ports:
      - "3000:3000"                     # Grafana's default port — open localhost:3000 in your browser to access the UI
    environment:
      GF_SECURITY_ADMIN_USER: admin         # Grafana admin username
      GF_SECURITY_ADMIN_PASSWORD: admin123  # Grafana admin password
    volumes:
      - grafana-data:/var/lib/grafana   # Persists Grafana dashboards and settings across restarts

# ─── VOLUMES ───────────────────────────────────────────────
# Named volumes are storage areas managed by Docker that live outside the containers.
# This means your data (Elasticsearch indexes, PostgreSQL records, Grafana dashboards)
# won't be lost when containers stop or restart.
volumes:
  elasticsearch-data:   # Storage for Elasticsearch indexed data
  postgresql-data:      # Storage for PostgreSQL database files
  grafana-data:         # Storage for Grafana dashboard configurations